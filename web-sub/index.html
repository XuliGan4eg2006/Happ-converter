<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proxy Subscription</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f13;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      padding: 48px 40px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      max-width: 420px;
      width: 90%;
    }
    h1 { font-size: 48px; color: #f0f6fc; margin-bottom: 12px; letter-spacing: -1px; }
    p  { font-size: 15px; color: #8b949e; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Back soon.</h1>
    <p>We'll be back shortly.</p>
  </div>
</body>
</html>
